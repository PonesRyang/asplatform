# =============================================================================
# Academic Support Platform — 配置文件
# 修改后自动热加载，无需重启服务
# =============================================================================

# ---------------------------------------------------------------------------
# 数据库 (支持 SQLite / MySQL / PostgreSQL)
# ---------------------------------------------------------------------------
database:
  # type: sqlite | mysql | postgresql
  type: sqlite

  # SQLite 模式（默认）
  url: "sqlite:///./sql_app.db"

  # MySQL / PostgreSQL 模式（取消注释并按需填写）
  # type: mysql
  # host: "127.0.0.1"
  # port: 3306
  # database: "asplatform"
  # username: "root"
  # password: "your-db-password"
  # pool_size: 5
  # max_overflow: 10

# ---------------------------------------------------------------------------
# JWT 鉴权
# ---------------------------------------------------------------------------
jwt:
  secret_key: "YOUR_SUPER_SECRET_KEY"   # ⚠️ 生产环境务必改为强随机字符串
  algorithm: "HS256"
  access_token_expire_minutes: 30

# ---------------------------------------------------------------------------
# CORS 跨域
# ---------------------------------------------------------------------------
cors:
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:5174"
    - "http://localhost:5175"
    - "http://localhost:5176"
    # 生产环境添加你的前端域名，如：
    # - "https://your-frontend.com"

# ---------------------------------------------------------------------------
# 管理员账号
# ---------------------------------------------------------------------------
admin:
  default_username: "admin"
  default_password: "admin123"          # ⚠️ 首次启动后建议修改

# ---------------------------------------------------------------------------
# AI 大模型 (兼容 OpenAI API 接口)
# ---------------------------------------------------------------------------
ai:
  api_key: "your-api-key-here"          # ⚠️ 替换为你的真实 API Key
  base_url: "https://api.deepseek.com/"
  model: "deepseek-v4-pro"            # deepseek-chat / deepseek-reasoner / gpt-4o 等
  temperature: 0.7
  max_tokens: 32000

# ---------------------------------------------------------------------------
# 服务器
# ---------------------------------------------------------------------------
server:
  host: "0.0.0.0"
  port: 8002
  reload: true                          # 开发模式热重载，生产环境建议 false

# ---------------------------------------------------------------------------
# 域名路由 (多域名映射不同前端模式)
# ---------------------------------------------------------------------------
domain_routes: {}
  # 示例:
  # "bio.your-domain.com": "bio"
  # "ai.your-domain.com": "ai"

# ---------------------------------------------------------------------------
# 静态文件
# ---------------------------------------------------------------------------
static:
  html_dir: "html"                      # 前端静态文件目录
